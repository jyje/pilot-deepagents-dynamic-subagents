name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - pyproject.toml
      - uv.lock
      - requirements*.txt
      - package.json
      - package-lock.json
      - README.md
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - pyproject.toml
      - uv.lock
      - requirements*.txt
      - package.json
      - package-lock.json
      - README.md

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Verify baseline toolchain
        run: |
          git --version
          python3 --version
